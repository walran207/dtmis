name: Manual Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to continue"
        required: true
        default: "NO"

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
    runs-on: [self-hosted, Windows, prod]
    timeout-minutes: 10
    steps:
      - name: Run deploy script on production server
        shell: powershell
        run: |
          & "D:\www\dtmis\scripts\deploy\prod-deploy.ps1"
