<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f4d7a">
    <title>Offline | DENR Region XII DTMIS</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(140deg, #f4f7fb 0%, #e8eef6 100%);
            color: #1e2c3a;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .offline-card {
            width: min(100%, 480px);
            border-radius: 16px;
            background: #ffffff;
            border: 1px solid #d8e2ed;
            box-shadow: 0 14px 30px rgba(20, 41, 71, 0.12);
            padding: 28px 24px;
        }

        .offline-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #1f4d7a;
            background: #e8f0fb;
            border: 1px solid #c6dbf6;
            border-radius: 999px;
            padding: 6px 10px;
        }

        h1 {
            margin: 14px 0 10px;
            font-size: 24px;
            line-height: 1.2;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.55;
            color: #435566;
        }

        .offline-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button,
        a {
            appearance: none;
            border: 0;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            background: #1f4d7a;
            color: #ffffff;
        }

        a {
            background: #eef3f8;
            color: #1f4d7a;
        }
    </style>
</head>
<body>
    <section class="offline-card" aria-live="polite">
        <span class="offline-badge">Offline Mode</span>
        <h1>Connection lost</h1>
        <p>
            DTMIS cannot reach the network right now. You can retry once internet
            access is available.
        </p>
        <div class="offline-actions">
            <button type="button" id="retryBtn">Retry</button>
            <a href="./">Go to Home</a>
        </div>
    </section>
    <script>
        (function () {
            var retryBtn = document.getElementById('retryBtn');
            if (!retryBtn) {
                return;
            }
            retryBtn.addEventListener('click', function () {
                window.location.reload();
            });
        })();
    </script>
</body>
</html>
